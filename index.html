<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Signature Day – You're In!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --grape:   #7c3aed;
    --violet:  #a855f7;
    --pink:    #ec4899;
    --coral:   #f97316;
    --yellow:  #facc15;
    --sky:     #38bdf8;
    --white:   #ffffff;
    --card-bg: rgba(255,255,255,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: #0f0623;
  }

  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%,  #7c3aed55 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 70%,  #ec489955 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 50% 100%, #38bdf855 0%, transparent 60%),
      radial-gradient(ellipse 90% 40% at 10% 90%,  #facc1533 0%, transparent 60%);
    animation: meshShift 10s ease-in-out infinite alternate;
  }
  @keyframes meshShift {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    50%  { filter: hue-rotate(20deg) brightness(1.15); }
    100% { filter: hue-rotate(-15deg) brightness(1.05); }
  }

  .stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.6); }
    50% { opacity: 0.85; transform: scale(1.1); }
  }

  #confetti-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

  .music-controls {
    position: fixed;
    top: 1.1rem; right: 1.1rem;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.6s ease 2.1s forwards;
  }

  .music-btn {
    min-width: 118px;
    height: 52px;
    padding: 0 1.1rem;
    border-radius: 999px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 0.5rem;
    font-size: 1rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 4px 24px rgba(168,85,247,0.35);
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.18s ease,
                background 0.2s ease;
    position: relative;
  }
  .music-btn:hover {
    transform: scale(1.12);
    box-shadow: 0 8px 36px rgba(168,85,247,0.55);
    background: rgba(255,255,255,0.2);
  }
  .music-btn:active { transform: scale(0.95); }

  .music-btn.playing::before {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(168,85,247,0.6);
    animation: musicRing 1.5s ease-out infinite;
  }
  .music-btn.playing::after {
    content: '';
    position: absolute; inset: -13px;
    border-radius: 50%;
    border: 2px solid rgba(236,72,153,0.35);
    animation: musicRing 1.5s ease-out infinite 0.55s;
  }
  @keyframes musicRing {
    0% { transform: scale(0.9); opacity: 0.8; }
    100% { transform: scale(1.55); opacity: 0; }
  }

  .music-label {
    position: fixed;
    top: 1.5rem; right: 9rem;
    z-index: 99;
    background: rgba(15,6,35,0.88);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius: 999px;
    padding: 0.38rem 1rem;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.02em;
    white-space: normal;
    text-align: right;
    line-height: 1.35;
    opacity: 0;
    transform: translateX(10px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .music-label.visible { opacity: 1; transform: translateX(0); }

  .floaters {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 3;
  }
  .floater {
    position: absolute;
    font-size: clamp(1.8rem, 4.5vw, 3rem);
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
    animation:
      floatBig var(--fd, 3s) ease-in-out infinite var(--fd2, 0s),
      sway var(--sw, 4s) ease-in-out infinite var(--sw2, 0s);
  }
  @keyframes floatBig {
    0% { transform: translateY(0) rotate(-10deg) scale(1); }
    30% { transform: translateY(-34px) rotate(12deg) scale(1.18); }
    65% { transform: translateY(-18px) rotate(-6deg) scale(0.93); }
    100% { transform: translateY(0) rotate(-10deg) scale(1); }
  }
  @keyframes sway {
    0%, 100% { left: var(--lx); }
    50% { left: calc(var(--lx) + 18px); }
  }

  .card {
    position: relative; z-index: 10;
    background: var(--card-bg);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 1.5px solid rgba(255,255,255,0.22);
    border-radius: 32px;
    padding: clamp(2.5rem, 7vw, 5rem) clamp(2rem, 8vw, 5.5rem);
    max-width: 680px;
    width: calc(100% - 2.5rem);
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06) inset,
      0 32px 80px rgba(0,0,0,0.45),
      0 0 120px rgba(168,85,247,0.25);
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .badge {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--violet), var(--pink));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.6rem;
    font-size: 2.4rem;
    box-shadow: 0 0 40px rgba(168,85,247,0.6), 0 0 80px rgba(236,72,153,0.3);
    animation: badgePop 0.7s cubic-bezier(0.34,1.56,0.64,1) 1s both;
  }
  @keyframes badgePop {
    from { transform: scale(0) rotate(-180deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .name-line {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    font-weight: 700;
    color: var(--yellow);
    text-shadow: 0 0 24px rgba(250,204,21,0.5);
    margin-bottom: 0.6rem;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.05s forwards;
    display: none;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    line-height: 1.12;
    background: linear-gradient(130deg, #fff 20%, var(--violet), var(--pink) 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.1s forwards;
  }

  .tagline {
    font-size: clamp(1rem, 2.8vw, 1.22rem);
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.01em;
    line-height: 1.6;
    margin-bottom: 2.4rem;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.3s forwards;
  }

  .pills {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.5s forwards;
  }
  .pill {
    padding: 0.42rem 1rem;
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 500;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 0.4rem;
  }

  .btn-celebrate {
    display: inline-flex; align-items: center; gap: 0.55rem;
    padding: 1rem 2.5rem;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 1.08rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: #fff;
    background: linear-gradient(135deg, var(--grape) 0%, var(--pink) 60%, var(--coral) 100%);
    background-size: 200% 200%;
    box-shadow: 0 8px 32px rgba(168,85,247,0.45), 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.18s ease,
                background-position 0.4s ease;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.7s forwards;
    position: relative;
    overflow: hidden;
  }
  .btn-celebrate::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .btn-celebrate:hover {
    transform: scale(1.07) translateY(-2px);
    box-shadow: 0 16px 48px rgba(168,85,247,0.55), 0 4px 12px rgba(0,0,0,0.3);
    background-position: right center;
  }
  .btn-celebrate:hover::after { transform: translateX(100%); }
  .btn-celebrate:active { transform: scale(0.97) translateY(0); }

  .divider {
    width: 60px; height: 3px;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--violet), var(--pink));
    margin: 1.6rem auto;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.4s forwards;
  }

  .footer-note {
    margin-top: 2rem;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.38);
    letter-spacing: 0.01em;
    opacity: 0;
    animation: fadeUp 0.6s ease 1.9s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card { border-radius: 24px; }
    .badge { width: 68px; height: 68px; font-size: 2rem; }
    .music-controls { top: 0.7rem; right: 0.7rem; }
    .music-btn { min-width: 102px; height: 44px; font-size: 0.9rem; }
    .music-label { top: 0.9rem; right: 7.6rem; font-size: 0.72rem; }
  }
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="stars" id="stars"></div>
<canvas id="confetti-canvas"></canvas>

<div class="floaters">
  <span class="floater" style="--lx:5%; top:7%; --fd:2.8s;--fd2:0s; --sw:4.5s;--sw2:0s">🎉</span>
  <span class="floater" style="--lx:88%; top:9%; --fd:2.4s;--fd2:0.6s;--sw:3.8s;--sw2:1s">✨</span>
  <span class="floater" style="--lx:7%; bottom:10%;--fd:3.2s;--fd2:1s; --sw:5s;--sw2:0.5s">🎊</span>
  <span class="floater" style="--lx:86%; bottom:13%;--fd:2.6s;--fd2:0.4s;--sw:4s;--sw2:1.5s">⭐</span>
  <span class="floater" style="--lx:2%; top:45%; --fd:3s;--fd2:1.8s; --sw:5.2s;--sw2:0.8s">🌟</span>
  <span class="floater" style="--lx:91%; top:45%; --fd:2.5s;--fd2:0.9s;--sw:3.5s;--sw2:0.2s">💫</span>
  <span class="floater" style="--lx:14%; top:27%; --fd:2.9s;--fd2:0.6s;--sw:4.8s;--sw2:1.2s">🎈</span>
  <span class="floater" style="--lx:78%; top:68%; --fd:3.3s;--fd2:1.4s;--sw:4.2s;--sw2:0.6s">🥳</span>
  <span class="floater" style="--lx:72%; top:20%; --fd:2.7s;--fd2:2s; --sw:3.9s;--sw2:1.8s">🎁</span>
</div>

<div class="music-controls" id="musicControls">
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()">▶ Play</button>
</div>
<div class="music-label" id="musicLabel">🎵 Tap for party music!</div>

<div class="card">
  <div class="badge">✓</div>
  <div class="name-line" id="nameLine"></div>
  <h1>🎉 You're Registered<br>for Signature Day!</h1>
  <div class="divider"></div>
  <p class="tagline">Get ready for memories, messages, and fun!<br>Your spot is confirmed and we can't wait to see you.</p>
  <div class="pills">
    <span class="pill">✨ Officially Registered</span>
    <span class="pill">🎊 Event Locked In</span>
  </div>
  <button class="btn-celebrate" onclick="burstConfetti()">
    Celebrate 🎊
  </button>
  <p class="footer-note">Questions? We've got you covered - check your inbox for details.</p>
</div>

<script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const raw = (params.get('name') || '').trim();
    if (raw) {
      const name = raw.charAt(0).toUpperCase() + raw.slice(1);
      const el = document.getElementById('nameLine');
      el.textContent = `Hey, ${name}! 👋`;
      el.style.display = 'block';
      document.title = `🎉 ${name} – Signature Day!`;
    }
  })();

  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 3 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:-${Math.random()*5}s;`;
    starsEl.appendChild(s);
  }

  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pieces = [], animId;
  const COLORS = ['#7c3aed','#a855f7','#ec4899','#f97316','#facc15','#38bdf8','#fff'];
  const SHAPES = ['circle','rect','triangle'];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  function randomPiece(burst=false) {
    const angle = burst ? Math.random()*Math.PI*2 : Math.random()*Math.PI - Math.PI*1.5;
    const speed = burst ? 8+Math.random()*12 : 4+Math.random()*6;
    return {
      x: burst ? W/2 : Math.random()*W, y: burst ? H/2 : -20,
      vx: Math.cos(angle)*speed*(burst?1:0.4), vy: burst ? Math.sin(angle)*speed : speed,
      size: 7+Math.random()*9, color: COLORS[Math.floor(Math.random()*COLORS.length)],
      shape: SHAPES[Math.floor(Math.random()*SHAPES.length)],
      rot: Math.random()*360, rotSpeed: (Math.random()-.5)*8,
      alpha: 1, gravity: 0.18+Math.random()*0.12
    };
  }
  function drawPiece(p) {
    ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);
    if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
    else if (p.shape === 'rect') { ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2); }
    else { ctx.beginPath(); ctx.moveTo(0,-p.size/2); ctx.lineTo(p.size/2,p.size/2); ctx.lineTo(-p.size/2,p.size/2); ctx.closePath(); ctx.fill(); }
    ctx.restore();
  }
  function tick() {
    ctx.clearRect(0,0,W,H);
    pieces = pieces.filter(p => p.alpha > 0.01 && p.y < H + 40);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.995; p.rot += p.rotSpeed;
      if (p.y > H * 0.6) p.alpha -= 0.012;
      drawPiece(p);
    });
    if (pieces.length > 0) animId = requestAnimationFrame(tick); else ctx.clearRect(0,0,W,H);
  }
  function spawnConfetti(count=120, burst=false) {
    for (let i = 0; i < count; i++) setTimeout(() => pieces.push(randomPiece(burst)), burst ? 0 : i * 18);
    cancelAnimationFrame(animId); tick();
  }
  function burstConfetti() { spawnConfetti(200,true); }
  window.addEventListener('load', () => setTimeout(() => spawnConfetti(150,false), 600));

  const PARTY_TRACK = {
    name: 'Golden Party Glow',
    bass: [73.42, 87.31, 98.0, 87.31],
    lead: [587.33, 783.99, 880.0, 783.99],
    leadWave: 'sawtooth',
    accent: 1.05
  };

  let audioCtx = null;
  let masterGain = null;
  let beatTimer = null;
  let isPlaying = false;
  let step = 0;

  function showToast(html) {
    const lbl = document.getElementById('musicLabel');
    lbl.innerHTML = html;
    lbl.classList.add('visible');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => lbl.classList.remove('visible'), 3200);
  }

  function ensureAudio() {
    if (!audioCtx) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContextClass();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.34;
      masterGain.connect(audioCtx.destination);
    }
    return audioCtx;
  }

  function pulseButton() {
    const btn = document.getElementById('musicBtn');
    btn.animate(
      [
        { transform: 'scale(1)' },
        { transform: 'scale(1.12)' },
        { transform: 'scale(1)' }
      ],
      { duration: 180, easing: 'ease-out' }
    );
  }

  function playKick(time, freq, accent) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 2.2, time);
    osc.frequency.exponentialRampToValueAtTime(freq, time + 0.12);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(0.28 * accent, time + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.26);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.28);
  }

  function playHat(time, accent) {
    const bufferSize = audioCtx.sampleRate * 0.05;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.55;

    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 6800;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.12 * accent, time);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.06);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start(time);
    noise.stop(time + 0.055);
  }

  function playBass(time, freq, accent) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, time);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(0.16 * accent, time + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.42);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.44);
  }

  function playLead(time, freq, wave, accent) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = wave;
    osc.frequency.setValueAtTime(freq, time);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(0.11 * accent, time + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.34);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.36);
  }

  function playSparkle(time, freq, accent) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq * 2, time);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(0.05 * accent, time + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.22);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.24);
  }

  function partyTick() {
    const mode = PARTY_TRACK;
    const now = audioCtx.currentTime;
    const bassFreq = mode.bass[step % mode.bass.length];
    const leadFreq = mode.lead[step % mode.lead.length];
    const strongBeat = step % 4 === 0;

    playKick(now, bassFreq, strongBeat ? 1.12 : 0.88);
    playHat(now + 0.12, 0.55);
    playHat(now + 0.36, 0.4);
    playBass(now, bassFreq, mode.accent);
    playLead(now + 0.04, leadFreq, mode.leadWave, strongBeat ? 1.05 : 0.82);
    playSparkle(now + 0.24, leadFreq, 0.9);

    if (step % 8 === 7) pulseButton();
    step += 1;
  }

  function startLoop() {
    ensureAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    stopLoop(false);
    step = 0;
    partyTick();
    beatTimer = setInterval(partyTick, 500);
  }

  function stopLoop(updateState = true) {
    if (beatTimer) {
      clearInterval(beatTimer);
      beatTimer = null;
    }
    if (updateState) isPlaying = false;
  }

  function updateMusicButton() {
    const btn = document.getElementById('musicBtn');
    if (isPlaying) {
      btn.textContent = '⏸ Pause';
      btn.classList.add('playing');
    } else {
      btn.textContent = '▶ Play';
      btn.classList.remove('playing');
    }
  }

  function toggleMusic() {
    if (isPlaying) {
      stopLoop(true);
      updateMusicButton();
      showToast('⏸ Party music paused');
      return;
    }

    isPlaying = true;
    startLoop();
    updateMusicButton();
    showToast(`🎉 <strong>${PARTY_TRACK.name}</strong><br><small style="opacity:.7">Built-in party beat</small>`);
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      showToast('🎵 Tap to start built-in party music!');
    }, 2500);
  });
</script>
</body>
</html>
